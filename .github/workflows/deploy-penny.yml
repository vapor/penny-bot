name: deploy bot stack
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push: { branches: [main] }

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-24.04-arm
    container: swift:6.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # actions/cache will detect zstd and will become much faster. curl for docker installation.
      - name: Install zstd
        run: |
          apt-get update -y
          apt-get install -y curl zstd

      - name: Restore/Cache .build
        if: ${{ runner.debug != '1' }}
        id: "restore-cache"
        uses: actions/cache@v5
        with:
          path: .build
          key: "penny-release-static-build-${{ runner.os }}-${{ github.event.after }}"
          restore-keys: "penny-release-static-build-${{ runner.os }}-"

      - name: Build Penny
        run: |
          apt-get update -y
          apt-get install -y libjemalloc-dev
          swift build \
            --product Penny \
            -c release \
            --force-resolved-versions \
            --static-swift-stdlib \
            -Xlinker -ljemalloc

      - name: Install Docker
        run: curl -fsSL https://get.docker.com | bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: penny-bot-discord-image
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile . \
            --build-arg SWIFT_CONFIGURATION=release \
            --build-arg EXEC_NAME=Penny
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@77954e213ba1f9f9cb016b86a1d4f6fcdea0d57e # v1.8.4
        with:
          task-definition: ./deploy/penny-discord-bot-task.json
          container-name: penny-bot
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS Service
        id: task-dep
        uses: aws-actions/amazon-ecs-deploy-task-definition@fc8fc60f3a60ffd500fcb13b209c59d221ac8c8c # v2.6.1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          wait-for-service-stability: true

      - name: Deploy to AWS cloudformation
        uses: aws-actions/aws-cloudformation-github-deploy@64bde66a4001208fc0917038be8846d99c9d0585 # v2.1.0
        with:
          name: penny-discord-bot-stack
          template: ./deploy/penny-discord-bot-stack.yml
          parameter-overrides: >-
            TaskDefinition=${{ steps.task-dep.outputs.task-definition-arn }}
