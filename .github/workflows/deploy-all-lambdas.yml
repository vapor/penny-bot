name: deploy lambda functions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push: { branches: [main] }

jobs:
  deploy-lambdas:
    # https://runs-on.com/features/custom-runners/
    runs-on:
      labels:
        - runs-on
        - runner=medium
        - run-id=${{ github.run_id }}
    container: amazonlinux:2023

    env:
      AWS_BUCKET_NAME: penny-lambdas-store
      AWS_DEFAULT_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOYER_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOYER_ACCESS_SECRET_KEY }}

    steps:
      - name: Configure RunsOn
        uses: runs-on/action@v2

      - name: Install AWSCLI v2, Swift, git, jq, zip, tar, zstd, zlib-devel
        run: |
          dnf install git jq zip tar awscli zstd zlib-devel swiftlang -y
          swift --version

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore .build
        if: ${{ runner.debug != '1' }}
        id: "restore-cache"
        uses: actions/cache/restore@v5
        with:
          path: .build
          key: "lambdas-build-${{ runner.os }}-${{ github.event.after }}"
          restore-keys: "lambdas-build-${{ runner.os }}-"

      - name: Find package names
        id: find_package_names
        run: |
          echo "names=$(
            swift package describe --type json | \
            jq -r '.targets[] |
              select(
                .type == "executable"
              and
                (.name | endswith("Lambda"))
              ).name' | \
            tr '\n' ' '
          )" >> $GITHUB_OUTPUT

      - name: Build lambdas
        run: |
          for name in ${{ steps.find_package_names.outputs.names }}; do
            swift build \
              -c release \
              --product "${name}" \
              --static-swift-stdlib
          done

      - name: Cache .build
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .build
          key: "lambdas-build-${{ runner.os }}-${{ github.event.after }}"

      - name: Package and deploy lambdas
        run: |
          for name in ${{ steps.find_package_names.outputs.names }}; do
            mkdir -p ./zips/"${name}"
            mv .build/release/"${name}" ./zips/"${name}"/bootstrap
            zip ./zips/"${name}"/"${name}".zip ./zips/"${name}"/bootstrap
            rm ./zips/"${name}"/bootstrap

            aws s3api put-object \
              --bucket "${AWS_BUCKET_NAME}" \
              --key "${name}".zip \
              --body ./zips/"${name}"/"${name}".zip

            aws lambda update-function-code \
              --function-name "${name}" \
              --s3-bucket "${AWS_BUCKET_NAME}" \
              --s3-key "${name}.zip"
          done
